<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MCP Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0f1a;--surface:#111827;--card:#1a2235;--hover:#222d42;--border:#2a3548;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;min-height:100vh}
.links{display:flex;flex-direction:column;gap:8px;padding:48px}
.links a{display:block;padding:16px 32px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);text-decoration:none;font-size:18px;font-weight:500;transition:all .15s}
.links a:hover{background:var(--hover);border-color:var(--accent);color:var(--accent)}
.links .title{font-size:28px;font-weight:800;color:var(--accent);margin-bottom:24px;text-align:center;border:none;background:none;padding:0}
.links .title:hover{background:none;color:var(--accent)}
</style>
</head>
<body>

<div class="title">MCP Academy</div>

<a href="pages/getting-started.html">Getting Started</a>

</div>
</body>
</html>
